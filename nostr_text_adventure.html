<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nostr Text Adventure — PoC</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c232c;
    --border: #2a313c;
    --text: #d3dae2;
    --muted: #7c8895;
    --accent: #f0b54a;
    --green: #6dc28d;
    --red: #e07a7a;
    --blue: #6ea8df;
    --purple: #b48ad6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    font-size: 14px;
  }
  #layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: 100vh;
  }
  #terminal-wrap {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    height: 100vh; min-width: 0;
  }
  #output {
    flex: 1; overflow-y: auto;
    padding: 20px 24px;
    line-height: 1.55;
  }
  #prompt-row {
    display: flex; align-items: center;
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    background: var(--panel);
  }
  .prompt { color: var(--accent); margin-right: 10px; font-weight: bold; }
  #cmd {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font: inherit;
  }
  .line { white-space: pre-wrap; word-wrap: break-word; }
  .line.title    { color: var(--accent); font-weight: bold; margin: 8px 0; }
  .line.echo     { color: var(--muted); }
  .line.system   { color: var(--blue); }
  .line.error    { color: var(--red); }
  .line.success  { color: var(--green); }
  .line.npc      { color: var(--purple); font-style: italic; }
  .line.whisper  { color: var(--purple); }
  .line.room-name{ color: var(--accent); font-weight: bold; margin-top: 6px; }
  .line.room-desc{ color: var(--text); }
  .line.items    { color: var(--green); }
  .line.exits    { color: var(--blue); }

  #side {
    background: var(--panel);
    overflow-y: auto;
    padding: 16px;
    height: 100vh;
  }
  #side section { margin-bottom: 22px; }
  #side h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin: 0 0 8px 0; font-weight: 600;
  }
  .kv { display: flex; gap: 8px; margin: 4px 0; font-size: 12px; align-items: baseline; }
  .kv .k { color: var(--muted); min-width: 56px; flex-shrink: 0; }
  .kv .v { color: var(--text); word-break: break-all; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
         background: var(--muted); margin-right: 6px; vertical-align: middle; }
  .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .feed {
    background: var(--panel-2); border-radius: 4px;
    border: 1px solid var(--border);
    padding: 4px;
    max-height: 240px; overflow-y: auto;
    font-size: 11.5px;
  }
  .feed-item {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px;
  }
  .feed-item:last-child { border-bottom: none; }
  .feed-item .sig { color: var(--accent); flex-shrink: 0; }
  .feed-item .msg { color: var(--text); word-break: break-word; min-width: 0; }
  .empty { color: var(--muted); padding: 8px; font-size: 11px; font-style: italic; }
  ::selection { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>
<div id="layout">
  <div id="terminal-wrap">
    <div id="output"></div>
    <div id="prompt-row">
      <span class="prompt">&gt;</span>
      <input id="cmd" autocomplete="off" autofocus spellcheck="false" />
    </div>
  </div>
  <aside id="side">
    <section>
      <h3>Identity</h3>
      <div class="kv"><span class="k">npub</span><span class="v" id="pubkey">generating…</span></div>
      <div class="kv"><span class="k">relays</span><span class="v"><span class="dot" id="relayDot"></span><span id="relays">connecting…</span></span></div>
      <div class="kv"><span class="k">kind</span><span class="v">30420 (custom, addressable)</span></div>
      <div class="kv"><span class="k">topic</span><span class="v">nostr-text-adventure-poc-v1</span></div>
    </section>
    <section>
      <h3>Your signed events</h3>
      <div class="feed" id="myEvents"><div class="empty">no events yet — try moving or looking</div></div>
    </section>
    <section>
      <h3>World feed (other players)</h3>
      <div class="feed" id="worldFeed"><div class="empty">open this file in another tab to see another character appear</div></div>
    </section>
  </aside>
</div>

<script type="module">
import {
  generateSecretKey, getPublicKey, finalizeEvent, SimplePool, nip19
} from 'https://esm.sh/nostr-tools@2.7.2';

// ============================================================
//  CONFIG
// ============================================================
const RELAYS = [
  'wss://relay.damus.io',
  'wss://nos.lol',
  'wss://relay.nostr.band'
];
const KIND  = 30420;                       // custom addressable game event
const TOPIC = 'nostr-text-adventure-poc-v1';

// ============================================================
//  IDENTITY
// ============================================================
const sk = generateSecretKey();
const pk = getPublicKey(sk);
const npub = nip19.npubEncode(pk);
const npubShort = npub.slice(0, 12) + '…' + npub.slice(-6);
document.getElementById('pubkey').textContent = npubShort;
document.getElementById('pubkey').title = npub;

// ============================================================
//  WORLD
// ============================================================
const world = {
  forest: {
    name: 'The Whispering Forest',
    desc: 'Tall pines lean overhead. Sunlight filters through in gold needles. A path winds east toward a canyon, and south to a small village. A glint of metal catches your eye in the underbrush.',
    exits: { east: 'canyon', south: 'village' },
    items: ['rusty_dagger']
  },
  canyon: {
    name: 'The Red Canyon',
    desc: 'A vast canyon stretches before you, walls glowing in the late afternoon light. The path continues east into a valley, or back west to the forest.',
    exits: { west: 'forest', east: 'valley' },
    items: ['smooth_stone']
  },
  valley: {
    name: 'The Quiet Valley',
    desc: 'A peaceful valley with a stream running through it. To the west is the canyon. A dark cave entrance gapes to the north.',
    exits: { west: 'canyon', north: 'cave' },
    items: ['silver_herb']
  },
  village: {
    name: 'Greenmeadow Village',
    desc: 'A handful of cottages cluster around a stone well. A merchant\'s cart sits in the square. The forest is to the north.',
    exits: { north: 'forest' },
    items: [],
    npcs: { merchant: 'A weathered trader with a kind eye. "Buying anything you don\'t need, traveler. Try `sell <item>`."' }
  },
  cave: {
    name: 'The Echoing Cave',
    desc: 'Cool damp air. Symbols glow faintly on the wall. A voice booms: "Speak the answer, traveler. I am tall when young, short when old. What am I?"',
    exits: { south: 'valley' },
    items: [],
    riddle: {
      answers: ['candle', 'a candle'],
      reward: 50,
      solved: false,
      onSolve: 'The voice murmurs in approval. The walls glow brighter. (+50 cerebrox)'
    }
  }
};

const ITEMS = {
  rusty_dagger: { display: 'rusty dagger', article: 'a', value: 5 },
  smooth_stone: { display: 'smooth stone', article: 'a', value: 1 },
  silver_herb:  { display: 'silver herb',  article: 'a', value: 8 }
};

const player = { location: 'forest', inventory: [], cerebrox: 10 };

// ============================================================
//  TERMINAL OUTPUT
// ============================================================
const out = document.getElementById('output');
function write(text='', cls='') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.textContent = text;
  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
}

// ============================================================
//  NOSTR
// ============================================================
const pool = new SimplePool();
const knownPlayers = new Map();
let relayUp = false;

async function publishAction(actionType, payload) {
  const evtTemplate = {
    kind: KIND,
    created_at: Math.floor(Date.now() / 1000),
    tags: [
      ['t', TOPIC],
      ['action', actionType],
      ['d', `${actionType}-${Date.now()}`]   // makes each event uniquely addressable
    ],
    content: JSON.stringify(payload)
  };
  const event = finalizeEvent(evtTemplate, sk);

  // log in "your events" feed
  const summary = formatActionSummary(actionType, payload);
  addToFeed('myEvents', summary, event.id.slice(0, 8));

  // fire to all relays — don't await individually
  try {
    const promises = pool.publish(RELAYS, event);
    Promise.any(promises).then(() => {
      if (!relayUp) {
        relayUp = true;
        document.getElementById('relayDot').classList.add('on');
        document.getElementById('relays').textContent = RELAYS.length + ' relays · live';
      }
    }).catch(() => {});
  } catch (e) {
    console.warn('publish error', e);
  }
  return event;
}

function subscribe() {
  pool.subscribeMany(
    RELAYS,
    [{ kinds: [KIND], '#t': [TOPIC], since: Math.floor(Date.now() / 1000) - 30 }],
    {
      onevent(event) {
        if (event.pubkey === pk) return;   // ignore our own echoes
        handleRemoteEvent(event);
      },
      oneose() { /* end of stored events */ }
    }
  );
}

function handleRemoteEvent(event) {
  const action = event.tags.find(t => t[0] === 'action')?.[1] || '?';
  let payload = {};
  try { payload = JSON.parse(event.content); } catch {}
  const shortPk = event.pubkey.slice(0, 8);

  if (!knownPlayers.has(event.pubkey)) {
    knownPlayers.set(event.pubkey, { firstSeen: Date.now(), location: payload.to || payload.location });
    write(`[network] New player detected: ${shortPk}…`, 'system');
  } else if (action === 'move') {
    knownPlayers.get(event.pubkey).location = payload.to;
  }

  addToFeed('worldFeed', `${shortPk}…  ${formatActionSummary(action, payload)}`, event.id.slice(0, 8));

  // narrative side-effects
  if (action === 'move' && payload.to === player.location) {
    write(`[network] ${shortPk}… enters ${world[payload.to].name}.`, 'system');
  }
  if (action === 'whisper' && payload.location === player.location) {
    write(`[${shortPk}…] "${payload.text}"`, 'whisper');
  }
}

function formatActionSummary(action, p) {
  switch (action) {
    case 'move':           return `move ${p.from || '?'} → ${p.to || '?'}`;
    case 'take':           return `take ${p.item} (${p.location})`;
    case 'drop':           return `drop ${p.item} (${p.location})`;
    case 'talk':           return `talk to ${p.npc}`;
    case 'sell':           return `sell ${p.item} for ${p.value}`;
    case 'whisper':        return `whisper "${(p.text || '').slice(0, 32)}"`;
    case 'riddle_solved':  return `solved riddle in ${p.location} (+${p.gained})`;
    case 'riddle_attempt': return `tried "${(p.text || '').slice(0, 24)}"`;
    case 'look':           return `look at ${p.location}`;
    default:               return action;
  }
}

function addToFeed(id, msg, sigPrefix) {
  const feed = document.getElementById(id);
  feed.querySelector('.empty')?.remove();
  const div = document.createElement('div');
  div.className = 'feed-item';
  const sigEl = document.createElement('span'); sigEl.className = 'sig'; sigEl.textContent = sigPrefix;
  const msgEl = document.createElement('span'); msgEl.className = 'msg'; msgEl.textContent = msg;
  div.append(sigEl, msgEl);
  feed.insertBefore(div, feed.firstChild);
  while (feed.childElementCount > 25) feed.lastChild.remove();
}

// ============================================================
//  GAME COMMANDS
// ============================================================
function describeRoom() {
  const room = world[player.location];
  write('');
  write(room.name, 'room-name');
  write(room.desc, 'room-desc');
  if (room.items?.length) {
    write('You see: ' + room.items.map(i => itemDisplay(i, true)).join(', '), 'items');
  }
  if (room.npcs) {
    write('Here: ' + Object.keys(room.npcs).join(', '), 'items');
  }
  // who else is here
  const others = [...knownPlayers.entries()].filter(([_, v]) => v.location === player.location);
  if (others.length) {
    write('Other travelers: ' + others.map(([pk]) => pk.slice(0,8) + '…').join(', '), 'system');
  }
  write('Exits: ' + Object.keys(room.exits).join(', '), 'exits');
}

function itemDisplay(id, withArticle = false) {
  const it = ITEMS[id];
  if (!it) return id;
  return withArticle ? `${it.article} ${it.display}` : it.display;
}

function findItemIn(list, query) {
  return list.findIndex(i => {
    const it = ITEMS[i];
    if (!it) return i === query;
    return i === query || it.display.includes(query) || it.display.split(' ').includes(query);
  });
}

function move(dir) {
  const room = world[player.location];
  const target = room.exits[dir];
  if (!target) { write("You can't go that way.", 'error'); return; }
  const from = player.location;
  player.location = target;
  publishAction('move', { from, to: target });
  describeRoom();
}

function take(arg) {
  const room = world[player.location];
  if (!room.items?.length) { write('There is nothing to take.', 'error'); return; }
  const idx = findItemIn(room.items, arg);
  if (idx === -1) { write(`You don't see "${arg}" here.`, 'error'); return; }
  const item = room.items.splice(idx, 1)[0];
  player.inventory.push(item);
  write(`You take ${itemDisplay(item, true)}.`);
  publishAction('take', { item, location: player.location });
}

function drop(arg) {
  const idx = findItemIn(player.inventory, arg);
  if (idx === -1) { write(`You don't have "${arg}".`, 'error'); return; }
  const item = player.inventory.splice(idx, 1)[0];
  (world[player.location].items ||= []).push(item);
  write(`You drop ${itemDisplay(item, true)}.`);
  publishAction('drop', { item, location: player.location });
}

function showInventory() {
  if (!player.inventory.length) { write('You carry nothing.'); return; }
  write('You carry: ' + player.inventory.map(i => itemDisplay(i, true)).join(', '));
}

function showStatus() {
  write(`Cerebrox: ${player.cerebrox}  ·  Inventory: ${player.inventory.length}  ·  Location: ${world[player.location].name}`);
}

function talk(target) {
  const room = world[player.location];
  if (!room.npcs?.[target]) { write(`There's no "${target}" here.`, 'error'); return; }
  write(room.npcs[target], 'npc');
  publishAction('talk', { npc: target, location: player.location });
}

function answer(text) {
  const room = world[player.location];
  if (!room.riddle) { write('There is nothing to answer here.', 'error'); return; }
  if (room.riddle.solved) { write('The riddle has already been solved.'); return; }
  const norm = text.toLowerCase().trim();
  if (room.riddle.answers.includes(norm)) {
    room.riddle.solved = true;
    player.cerebrox += room.riddle.reward;
    write(room.riddle.onSolve, 'success');
    publishAction('riddle_solved', { location: player.location, gained: room.riddle.reward });
  } else {
    write('The voice is silent. That is not the answer.', 'error');
    publishAction('riddle_attempt', { location: player.location, text: norm });
  }
}

function sell(arg) {
  if (player.location !== 'village') { write('There is no one here to buy from you.', 'error'); return; }
  const idx = findItemIn(player.inventory, arg);
  if (idx === -1) { write(`You don't have "${arg}".`, 'error'); return; }
  const item = player.inventory.splice(idx, 1)[0];
  const value = ITEMS[item].value;
  player.cerebrox += value;
  write(`The merchant takes ${itemDisplay(item, true)} and gives you ${value} cerebrox.`, 'success');
  publishAction('sell', { item, value, location: player.location });
}

function whisper(text) {
  if (!text) { write('Whisper what?', 'error'); return; }
  write(`You whisper: "${text}"`, 'whisper');
  publishAction('whisper', { text, location: player.location });
}

function who() {
  if (knownPlayers.size === 0) {
    write('No other players seen yet. Open this file in another browser tab to spawn a second character.');
    return;
  }
  write(`Known players: ${knownPlayers.size}`);
  for (const [pkOther, info] of knownPlayers) {
    const ago = Math.round((Date.now() - info.firstSeen) / 1000);
    write(`  ${pkOther.slice(0, 16)}…  loc=${info.location || '?'}  (seen ${ago}s ago)`);
  }
}

function help() {
  const lines = [
    'Commands:',
    '  look / l               describe surroundings',
    '  n / s / e / w          move (or "go north")',
    '  take <item>            pick up an item',
    '  drop <item>            drop an item',
    '  inv / i                show inventory',
    '  status                 show stats',
    '  talk <npc>             speak to someone',
    '  answer <text>          answer a riddle',
    '  sell <item>            sell to merchant',
    '  whisper <text>         broadcast to other players',
    '  who                    list other players seen',
    '  clear                  clear screen',
    '  help                   show this list'
  ];
  for (const l of lines) write(l, 'system');
}

// ============================================================
//  PARSER
// ============================================================
function handleCommand(input) {
  const raw = input.trim();
  if (!raw) return;
  write('> ' + raw, 'echo');

  const parts = raw.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const argRaw = parts.slice(1).join(' ');
  const arg = argRaw.toLowerCase();
  const dirAlias = { n:'north', s:'south', e:'east', w:'west' };

  switch (cmd) {
    case 'look': case 'l':       describeRoom(); break;
    case 'go': case 'move':      move(dirAlias[arg] || arg); break;
    case 'n': case 'north':      move('north'); break;
    case 's': case 'south':      move('south'); break;
    case 'e': case 'east':       move('east'); break;
    case 'w': case 'west':       move('west'); break;
    case 'take': case 'get': case 'grab': take(arg); break;
    case 'drop':                 drop(arg); break;
    case 'inv': case 'inventory': case 'i': showInventory(); break;
    case 'status': case 'stats': showStatus(); break;
    case 'talk':                 talk(arg); break;
    case 'answer': case 'say':   answer(argRaw); break;
    case 'sell':                 sell(arg); break;
    case 'whisper': case 'shout':whisper(argRaw); break;
    case 'who':                  who(); break;
    case 'help': case '?':       help(); break;
    case 'clear':                out.innerHTML = ''; break;
    default:                     write(`Unknown command: ${cmd}. Type "help".`, 'error');
  }
}

// ============================================================
//  BOOTSTRAP
// ============================================================
const cmdInput = document.getElementById('cmd');
cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = cmdInput.value;
    cmdInput.value = '';
    handleCommand(v);
  }
});

write('=== Nostr Text Adventure — Proof of Concept ===', 'title');
write('');
write(`Your identity (pubkey, generated fresh): ${npubShort}`, 'system');
write(`Connecting to ${RELAYS.length} public Nostr relays…`, 'system');
write('Each command you run is signed with your private key and published as a Nostr event.', 'system');
write('Open this same HTML file in a second browser tab — it will get a different keypair', 'system');
write('and the two characters will see each other through the relay network.', 'system');
write('');
write('Type "help" for commands, or "look" to begin.', 'system');
write('');
describeRoom();

subscribe();

// connection heartbeat — flip the dot on once we successfully publish anything
publishAction('look', { location: player.location });
</script>
</body>
</html>
